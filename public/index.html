<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PitchPick Full Stack</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="theme-dark">
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">PP</span>
          <strong>PitchPick</strong>
        </div>
        <nav class="side-nav">
          <button class="active" data-route="player">Player</button>
          <button data-route="matchups">Matchups</button>
          <button data-route="admin">Admin</button>
          <button data-route="leaderboard">Leaderboard</button>
          <button data-route="rules">Rules</button>
        </nav>
        <div class="status-card">
          <p class="label">Local MVP</p>
          <strong>Frontend + backend</strong>
          <span>Mock provider, JSON metadata, seeded friends league.</span>
        </div>
      </aside>

      <div class="main">
        <header class="topbar">
          <div>
            <p class="label" id="leagueName">Golden Boot League</p>
            <strong id="matchdayName">Matchday</strong>
          </div>
          <nav class="top-tabs">
            <button class="active" data-route="player">Matchday</button>
            <button data-route="matchups">Matchups</button>
            <button data-route="admin">Admin</button>
            <button data-route="leaderboard">Standings</button>
            <button data-route="rules">Rules</button>
          </nav>
          <div class="top-actions">
            <button id="themeToggle" class="theme-toggle">Dark</button>
            <button id="refreshButton" class="light-button">Refresh</button>
            <button id="logoutButton" class="light-button" hidden>Log Out</button>
          </div>
        </header>

        <main id="appRoot" class="content" aria-live="polite">
          <div class="loading">Loading PitchPick...</div>
        </main>
      </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="app.js"></script>
  </body>
</html>
