name: Sync Live Data

on:
  workflow_dispatch:
    inputs:
      sync:
        description: "Which data to sync"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - fixtures
          - odds
  schedule:
    # Fixture refresh before the first match window.
    - cron: "0 11 * * *"
    # Odds refresh once per day.
    - cron: "30 10 * * *"
    # Fixture refresh after the late match window.
    - cron: "30 5 * * *"

jobs:
  sync-live-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "APP_URL GitHub secret is missing."
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "CRON_SECRET GitHub secret is missing."
            exit 1
          fi

      - name: Call PitchPick sync endpoint
        run: |
          SYNC_MODE="${{ github.event.inputs.sync }}"
          if [ -z "$SYNC_MODE" ]; then
            case "${{ github.event.schedule }}" in
              "30 10 * * *") SYNC_MODE="odds" ;;
              *) SYNC_MODE="fixtures" ;;
            esac
          fi

          curl --fail-with-body --show-error --location \
            --retry 5 \
            --retry-delay 20 \
            --retry-all-errors \
            --request POST \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --header "Content-Type: application/json" \
            --data "{\"sync\":\"${SYNC_MODE}\"}" \
            "${{ secrets.APP_URL }}/api/jobs/sync-live-data"
